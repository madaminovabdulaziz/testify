# Alembic configuration.
# The actual sqlalchemy.url is composed from environment variables inside
# alembic/env.py — DO NOT set it here. This keeps secrets out of the repo.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
# Output encoding used when revision files are written.
output_encoding = utf-8
# Use UTC timestamps in generated revisions.
timezone = UTC

# ---------- logging ----------

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
