{% extends "base.html" %}
{% block title %}Вход — Панель администратора{% endblock %}
{% block content %}
<div class="login-card">
  <h1>Вход в панель</h1>
  <ol class="login-steps">
    <li>Откройте бота в Telegram</li>
    <li>Отправьте команду <code>/weblogin</code></li>
    <li>Введите полученный 6-значный код</li>
  </ol>
  {% if error %}<p class="alert alert-error">{{ error }}</p>{% endif %}
  <form method="post" action="/panel/login">
    <label class="field-label" for="code">Код из бота</label>
    <input class="code-input" id="code" name="code" type="text"
           inputmode="numeric" pattern="[0-9]{6}" maxlength="6"
           placeholder="000000" autocomplete="one-time-code" autofocus required>
    <button type="submit" class="btn btn-primary btn-block">Войти</button>
  </form>
</div>
{% endblock %}
